<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smellcheck — Detecting AI smells in your text</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0E0F11;
      --surface:   #17191D;
      --border:    #2A2D33;
      --text:      #E8EAF0;
      --muted:     #6B7180;
      --accent:    #F0F060;

      --typo-bg:   rgba(255, 80, 80, 0.18);
      --typo-border: #FF5050;
      --uni-bg:    rgba(255, 190, 50, 0.18);
      --uni-border: #FFBE32;
      --buzz-bg:   rgba(80, 160, 255, 0.18);
      --buzz-border: #50A0FF;
      --unat-bg:   rgba(180, 100, 255, 0.18);
      --unat-border: #B464FF;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────── */
    header {
      padding: 32px 40px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 24px;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--accent);
    }

    .logo-sub {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Layout ─────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 340px;
      grid-template-rows: 1fr auto;
      gap: 0;
      height: calc(100vh - 89px);
    }

    /* ── Editor pane ─────────────────────── */
    .editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
    }

    .pane-header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .pane-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      gap: 8px;
    }

    button {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover { background: #22252C; border-color: #3A3D44; }

    button.primary {
      background: var(--accent);
      color: #0E0F11;
      border-color: var(--accent);
      font-weight: 700;
    }

    button.primary:hover { background: #E0E050; }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      padding: 20px;
      tab-size: 2;
    }

    textarea::placeholder { color: var(--muted); }

    /* ── Preview pane ────────────────────── */
    .preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .preview-content mark {
      border-radius: 2px;
      cursor: help;
      transition: filter 0.15s;
    }

    .preview-content mark:hover { filter: brightness(1.3); }

    mark.smellcheck-typography {
      background: var(--typo-bg);
      outline: 1px solid var(--typo-border);
    }

    mark.smellcheck-unicode {
      background: var(--uni-bg);
      outline: 1px solid var(--uni-border);
    }

    mark.smellcheck-buzzwords {
      background: var(--buzz-bg);
      outline: 1px solid var(--buzz-border);
    }

    mark.smellcheck-unnatural {
      background: var(--unat-bg);
      outline: 1px solid var(--unat-border);
    }

    /* ── Sidebar ─────────────────────────── */
    .sidebar {
      grid-column: 2;
      grid-row: 1 / 3;
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-title {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Status badge ────────────────────── */
    .status-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.2s;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .status-badge.clean .status-dot { background: #50C878; box-shadow: 0 0 8px #50C87888; }
    .status-badge.flagged .status-dot { background: #FF5050; box-shadow: 0 0 8px #FF505088; animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-label {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
    }

    /* ── Plugin toggles ──────────────────── */
    .plugin-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .plugin-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .plugin-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .plugin-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .plugin-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-width: 24px;
      text-align: right;
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 9px;
      background: var(--border);
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track { background: var(--accent); }

    .toggle-track::before {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-track::before {
      transform: translateX(14px);
      background: #0E0F11;
    }

    /* ── Match list ──────────────────────── */
    .match-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .match-item {
      padding: 8px 10px;
      border-radius: 4px;
      margin-bottom: 4px;
      border-left: 2px solid transparent;
      cursor: default;
      transition: background 0.1s;
    }

    .match-item:hover { background: var(--surface); }

    .match-item.typography { border-color: var(--typo-border); }
    .match-item.unicode    { border-color: var(--uni-border); }
    .match-item.buzzwords  { border-color: var(--buzz-border); }
    .match-item.unnatural  { border-color: var(--unat-border); }

    .match-word {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .match-reason {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.3;
    }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    /* ── Legend ──────────────────────────── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .legend-chip {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }


    /* ── Score meter ─────────────────────────── */
    .score-section {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    .score-meter {
      margin-bottom: 14px;
    }

    .score-meter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
      font-size: 13px;
    }

    .score-value {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 700;
    }

    .score-bar-track {
      background: var(--border);
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.4s ease, background 0.4s ease;
    }

    .score-findings {
      margin-top: 8px;
    }

    .score-finding {
      padding: 6px 8px;
      border-radius: 4px;
      margin-top: 4px;
      border-left: 2px solid var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .score-finding.high   { border-color: var(--typo-border); background: var(--typo-bg); }
    .score-finding.medium { border-color: var(--uni-border);  background: var(--uni-bg); }
    .score-finding.low    { border-color: var(--muted); }

    .score-skipped {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Scrollbars ──────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Responsive ──────────────────────── */
    @media (max-width: 768px) {
      main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        height: auto;
      }
      .sidebar { grid-column: 1; border-left: none; border-top: 1px solid var(--border); }
      header { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">👃 smellcheck</div>
  <div class="logo-sub">detecting AI smells in your texts</div>
</header>

<main>
  <!-- Editor pane -->
  <div class="editor-pane">
    <div class="pane-header">
      <span class="pane-label">Input</span>
      <div class="toolbar">
        <button onclick="pasteFromClipboard()">Paste clipboard</button>
        <button onclick="loadSample()">Load sample</button>
        <button onclick="clearAll()">Clear</button>
      </div>
    </div>
    <textarea
      id="input"
      placeholder="Paste or type text here to analyze it for AI smells…"
      spellcheck="false"
    ></textarea>
  </div>

  <!-- Preview pane -->
  <div class="preview-pane" style="border-right:1px solid var(--border);">
    <div class="pane-header">
      <span class="pane-label">Highlighted output</span>
    </div>
    <div class="preview-content" id="preview">
      <span style="color:var(--muted);font-style:italic;">Highlights will appear here as you type…</span>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Status -->
    <div class="sidebar-section">
      <div class="sidebar-title">Status</div>
      <div class="status-badge" id="status-badge">
        <div class="status-dot"></div>
        <span class="status-label" id="status-label">Waiting for input</span>
      </div>
    </div>

    <!-- Plugin toggles -->
    <div class="sidebar-section">
      <div class="sidebar-title">Plugins</div>
      <div class="plugin-list" id="plugin-list">
        <!-- Injected by JS -->
      </div>
    </div>

    <!-- Match list -->
    <div class="sidebar-title" style="padding:12px 16px 0;">Matches</div>
    <div class="match-list" id="match-list">
      <div class="empty-state">No matches yet.<br>Type or paste text to begin.</div>
    </div>


    <!-- Score plugins -->
    <div class="score-section" id="score-section" style="display:none;">
      <div class="sidebar-title" style="margin-bottom:10px;">Analysis Scores</div>
      <div id="score-meters"></div>
    </div>

    <!-- Legend -->
    <div class="legend">
      <span class="legend-chip" style="background:var(--typo-bg);outline:1px solid var(--typo-border);">Typography</span>
      <span class="legend-chip" style="background:var(--uni-bg);outline:1px solid var(--uni-border);">Unicode</span>
      <span class="legend-chip" style="background:var(--buzz-bg);outline:1px solid var(--buzz-border);">Buzzword</span>
      <span class="legend-chip" style="background:var(--unat-bg);outline:1px solid var(--unat-border);">Unnatural</span>
    </div>
  </div>
</main>

<script type="module">
// ── Inline smellcheck (self-contained, no build required for demo) ──────────

const SUSPICIOUS_CHARS = [
  { pattern: /\u2014/g, reason: 'Em dash (—) — rarely typed manually' },
  { pattern: /\u2013/g, reason: 'En dash (–) — rarely typed manually' },
  { pattern: /\u00A0/g, reason: 'Non-breaking space' },
  { pattern: /\u200B/g, reason: 'Zero-width space' },
  { pattern: /\u200C/g, reason: 'Zero-width non-joiner' },
  { pattern: /\u200D/g, reason: 'Zero-width joiner' },
  { pattern: /\uFEFF/g, reason: 'Byte order mark' },
  { pattern: /\u2018|\u2019/g, reason: 'Curly single quote' },
  { pattern: /\u201C|\u201D/g, reason: 'Curly double quote' },
  { pattern: /\u2026/g, reason: 'Ellipsis character (…)' },
  { pattern: /\u00AD/g, reason: 'Soft hyphen' },
];

const UNICODE_RANGES = [
  [0x1F600, 0x1F64F, 'Emoticons'],
  [0x1F300, 0x1F5FF, 'Symbols & pictographs'],
  [0x1F680, 0x1F6FF, 'Transport symbols'],
  [0x1F900, 0x1F9FF, 'Supplemental symbols'],
  [0x1FA70, 0x1FAFF, 'Symbols extended-A'],
  [0x2600,  0x26FF,  'Miscellaneous symbols'],
  [0x2700,  0x27BF,  'Dingbats'],
];

const BUZZWORDS = [
  'delve','delves','delved','delving','tapestry','unleash','unleashes','unleashed',
  'unpack','unpacks','nuanced','nuance','multifaceted','groundbreaking','pivotal',
  'transformative','revolutionary','paradigm','synergy','holistic','robust',
  'leverage','leverages','leveraged','leveraging','scalable','ecosystem','empower',
  'empowers','streamline','streamlined','innovative','innovation','cutting-edge',
  'state-of-the-art','game-changing','disruptive','actionable','impactful',
  'overarching','bespoke','curated','foster','facilitate','utilize','utilizes',
  'utilized','endeavor','endeavour','commendable','meticulous','meticulously',
  'comprehensive','invaluable','vibrant','dynamic','remarkable','crucial',
  'vital','imperative',
  "it's worth noting","it is worth noting","in conclusion","in summary",
  "needless to say","dive deep","deep dive","shed light on","a wealth of",
  "a plethora of","let's explore","navigating the","stands as a testament",
];

const UNNATURAL = [
  'aforementioned','aforesaid','heretofore','hitherto','herein','hereinafter',
  'therein','thereof','whereby','wherein','whereupon','whilst','notwithstanding',
  'insofar','inasmuch','forthwith','henceforth','inter alia','ergo','ipso facto',
  'prima facie','de facto','de jure','modus operandi','sine qua non',
  'effectuate','operationalize','conceptualize','institutionalize','incentivize',
  'systematize','contextualize','reimagine','ubiquitous','efficacious',
  'perspicacious','sagacious','propitious','auspicious','felicitous',
  'elucidate','elucidates','elucidated','elucidating','explicate','delineate',
  'promulgate','instantiate','subsume','undergird','presuppose','dialectical',
  'epistemological','ontological','axiomatically','substantiate','corroborate',
  'ameliorate','ameliorates','exacerbate','exacerbates','proliferate',
  'mitigate','mitigates','obviate','reiterate','extrapolate','interpolate',
];

function buildPattern(words) {
  const sorted = [...words].sort((a,b) => b.length - a.length);
  const escaped = sorted.map(w => w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  return new RegExp(`(?<![\\w-])(${escaped.join('|')})(?![\\w-])`, 'gi');
}

const BUZZ_PATTERN = buildPattern(BUZZWORDS);
const UNAT_PATTERN = buildPattern(UNNATURAL);

function analyzeTypography(text) {
  const matches = [];
  for (const {pattern, reason} of SUSPICIOUS_CHARS) {
    pattern.lastIndex = 0;
    let m;
    while ((m = pattern.exec(text)) !== null) {
      matches.push({ text: m[0], index: m.index, length: m[0].length, plugin: 'typography', reason });
    }
  }
  return { plugin: 'typography', flagged: matches.length > 0, matches };
}

function analyzeUnicode(text) {
  const matches = [];
  let i = 0;
  for (const char of text) {
    const cp = char.codePointAt(0);
    for (const [start, end, reason] of UNICODE_RANGES) {
      if (cp >= start && cp <= end) {
        matches.push({ text: char, index: i, length: char.length, plugin: 'unicode',
          reason: `Suspicious Unicode (${reason}): U+${cp.toString(16).toUpperCase().padStart(4,'0')}` });
        break;
      }
    }
    i += char.length;
  }
  return { plugin: 'unicode', flagged: matches.length > 0, matches };
}

function analyzeWords(text, pattern, plugin, labelFn) {
  const matches = [];
  pattern.lastIndex = 0;
  let m;
  while ((m = pattern.exec(text)) !== null) {
    matches.push({ text: m[0], index: m.index, length: m[0].length, plugin, reason: labelFn(m[0]) });
  }
  return { plugin, flagged: matches.length > 0, matches };
}

function analyze(text, enabled) {
  const results = [];
  if (enabled.typography) results.push(analyzeTypography(text));
  if (enabled.unicode)    results.push(analyzeUnicode(text));
  if (enabled.buzzwords)  results.push(analyzeWords(text, BUZZ_PATTERN, 'buzzwords', w => `AI buzzword: "${w.toLowerCase()}"`));
  if (enabled.unnatural)  results.push(analyzeWords(text, UNAT_PATTERN, 'unnatural', w => `Unnatural word: "${w.toLowerCase()}"`));
  const allMatches = results.flatMap(r => r.matches).sort((a,b) => a.index - b.index);
  const suResult = analyzeSentenceUniformity(text);
  const scoredPlugins = [suResult];
  const flagged = results.some(r => r.flagged) || scoredPlugins.some(r => !r.skipped && r.score > 0);
  return { flagged, plugins: results, scoredPlugins, allMatches };
}


// ── Sentence Uniformity ───────────────────────────────────────────────────────

const ABBREV_RE = /\b(Dr|Mr|Mrs|Ms|Prof|Sr|Jr|vs|e\.g|i\.e|etc|No|Fig|al|ca|Jan|Feb|Mar|Apr|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\.(?=\s)/gi;

function splitSentences(text) {
  const protected_ = text.replace(ABBREV_RE, m => m.slice(0,-1) + '\x00');
  return protected_
    .split(/(?<=[.!?])\s+(?=[A-Z\u00C0-\u00DC])/)
    .map(s => s.replace(/\x00/g, '.').trim())
    .filter(s => s.split(/\s+/).filter(w => w.length > 0).length >= 2);
}

function analyzeSentenceUniformity(text, cfg = {}) {
  const minSentences  = cfg.minSentences  ?? 6;
  const stddevFloor   = cfg.stddevFloor   ?? 4.5;
  const stddevCeiling = cfg.stddevCeiling ?? 12.0;
  const penaltyShort  = cfg.penaltyShort  ?? 0.15;

  const sentences = splitSentences(text);
  if (sentences.length < minSentences) {
    return { plugin: 'sentenceUniformity', score: 0, skipped: true,
      skipReason: `Only ${sentences.length} sentence(s); need at least ${minSentences}`, findings: [] };
  }

  const lengths = sentences.map(s => s.split(/\s+/).filter(w => w.length > 0).length);
  const mn = lengths.reduce((a,b) => a+b, 0) / lengths.length;
  const variance = lengths.reduce((a,b) => a + (b-mn)**2, 0) / lengths.length;
  const sd = Math.sqrt(variance);

  let score;
  if (sd <= stddevFloor) score = 1.0;
  else if (sd >= stddevCeiling) score = 0.0;
  else score = 1.0 - (sd - stddevFloor) / (stddevCeiling - stddevFloor);

  const findings = [];
  if (score > 0) {
    const severity = score >= 0.7 ? 'high' : score >= 0.35 ? 'medium' : 'low';
    findings.push({
      label: 'low_sentence_stddev', severity,
      detail: `Stddev: ${sd.toFixed(2)} words | Mean: ${mn.toFixed(1)} words | ${lengths.length} sentences`,
      evidence: { sentenceCount: lengths.length, meanWords: mn, stddevWords: sd, lengths },
    });
  }
  if (score > 0 && mn < 15) {
    score = Math.min(1.0, score + penaltyShort);
    findings.push({
      label: 'short_uniform_sentences', severity: 'medium',
      detail: `Short + uniform prose (mean ${mn.toFixed(1)} words). AI listicle penalty applied.`,
      evidence: { meanWords: mn },
    });
  }

  return { plugin: 'sentenceUniformity', score: parseFloat(score.toFixed(4)), skipped: false, findings };
}

function renderScoreMeter(result) {
  const LABELS = { sentenceUniformity: 'Sentence Uniformity' };
  const label = LABELS[result.plugin] ?? result.plugin;

  if (result.skipped) {
    return `<div class="score-meter">
      <div class="score-meter-header">
        <span>${label}</span>
        <span class="score-skipped">${escapeHtml(result.skipReason ?? 'skipped')}</span>
      </div>
    </div>`;
  }

  const pct = Math.round(result.score * 100);
  const barColor = result.score >= 0.7 ? 'var(--typo-border)' : result.score >= 0.35 ? 'var(--uni-border)' : '#50C878';

  const findingsHtml = result.findings.map(f =>
    `<div class="score-finding ${f.severity}">
      <strong>${escapeHtml(f.label)}</strong><br>${escapeHtml(f.detail)}
    </div>`
  ).join('');

  return `<div class="score-meter">
    <div class="score-meter-header">
      <span>${label}</span>
      <span class="score-value" style="color:${barColor};">${pct}%</span>
    </div>
    <div class="score-bar-track">
      <div class="score-bar-fill" style="width:${pct}%;background:${barColor};"></div>
    </div>
    ${findingsHtml ? `<div class="score-findings">${findingsHtml}</div>` : ''}
  </div>`;
}

// ── Rendering ────────────────────────────────────────────────────────────────

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderHighlighted(text, allMatches) {
  if (!allMatches.length) return `<span style="color:var(--muted);font-style:italic;">No matches — text looks clean ✓</span>`;
  let html = '', cursor = 0;
  for (const m of allMatches) {
    if (m.index > cursor) html += escapeHtml(text.slice(cursor, m.index));
    html += `<mark class="smellcheck smellcheck-${m.plugin}" title="${escapeHtml(m.reason)}">${escapeHtml(m.text)}</mark>`;
    cursor = m.index + m.length;
  }
  html += escapeHtml(text.slice(cursor));
  return html;
}

// ── State & UI ───────────────────────────────────────────────────────────────

const PLUGINS = [
  { id: 'typography', label: 'Typography',  color: 'var(--typo-border)' },
  { id: 'unicode',    label: 'Unicode',     color: 'var(--uni-border)' },
  { id: 'buzzwords',  label: 'Buzzwords',   color: 'var(--buzz-border)' },
  { id: 'unnatural',  label: 'Unnatural',   color: 'var(--unat-border)' },
];

const enabled = { typography: true, unicode: true, buzzwords: true, unnatural: true };

// Render plugin toggles
const pluginListEl = document.getElementById('plugin-list');
PLUGINS.forEach(p => {
  const row = document.createElement('div');
  row.className = 'plugin-row';
  row.innerHTML = `
    <div class="plugin-name">
      <div class="plugin-dot" style="background:${p.color}"></div>
      <span>${p.label}</span>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="plugin-count" id="count-${p.id}">—</span>
      <label class="toggle">
        <input type="checkbox" checked id="toggle-${p.id}">
        <div class="toggle-track"></div>
      </label>
    </div>
  `;
  pluginListEl.appendChild(row);

  document.getElementById(`toggle-${p.id}`).addEventListener('change', e => {
    enabled[p.id] = e.target.checked;
    run();
  });
});

function run() {
  const text = document.getElementById('input').value;
  const preview = document.getElementById('preview');
  const matchList = document.getElementById('match-list');
  const badge = document.getElementById('status-badge');
  const label = document.getElementById('status-label');

  if (!text.trim()) {
    preview.innerHTML = '<span style="color:var(--muted);font-style:italic;">Highlights will appear here as you type…</span>';
    matchList.innerHTML = '<div class="empty-state">No matches yet.<br>Type or paste text to begin.</div>';
    badge.className = 'status-badge';
    label.textContent = 'Waiting for input';
    PLUGINS.forEach(p => { document.getElementById(`count-${p.id}`).textContent = '—'; });
    return;
  }

  const result = analyze(text, enabled);

  // Preview
  preview.innerHTML = renderHighlighted(text, result.allMatches);

  // Status
  badge.className = `status-badge ${result.flagged ? 'flagged' : 'clean'}`;
  label.textContent = result.flagged
    ? `${result.allMatches.length} AI smell${result.allMatches.length !== 1 ? 's' : ''} found`
    : 'Looks clean';

  // Counts
  PLUGINS.forEach(p => {
    const pr = result.plugins.find(r => r.plugin === p.id);
    document.getElementById(`count-${p.id}`).textContent = pr ? `${pr.matches.length}` : '0';
  });

  // Match list
  // Score meters
  const scoreSection = document.getElementById('score-section');
  const scoreMeters  = document.getElementById('score-meters');
  if (result.scoredPlugins && result.scoredPlugins.length > 0) {
    scoreSection.style.display = '';
    scoreMeters.innerHTML = result.scoredPlugins.map(renderScoreMeter).join('');
  } else {
    scoreSection.style.display = 'none';
  }

    if (!result.allMatches.length) {
    matchList.innerHTML = '<div class="empty-state">No matches — text looks clean ✓</div>';
    return;
  }

  matchList.innerHTML = result.allMatches.map(m => {
    const display = m.text.trim() || `U+${m.text.codePointAt(0).toString(16).toUpperCase().padStart(4,'0')}`;
    return `<div class="match-item ${m.plugin}">
      <div class="match-word">${escapeHtml(display)}</div>
      <div class="match-reason">${escapeHtml(m.reason)}</div>
    </div>`;
  }).join('');
}

// Debounce
let timer;
document.getElementById('input').addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(run, 150);
});

// Clipboard
window.pasteFromClipboard = async () => {
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('input').value = text;
    run();
  } catch { alert('Clipboard access denied — please paste manually (Ctrl+V / Cmd+V).'); }
};

// Clear
window.clearAll = () => {
  document.getElementById('input').value = '';
  run();
};

// Sample AI text
window.loadSample = () => {
  document.getElementById('input').value = `In the ever-evolving landscape of digital communication, it's worth noting that the utilization of AI-generated content has become both groundbreaking and transformative. This comprehensive analysis aims to elucidate the multifaceted nuances — and there are many — of this paradigm shift.

Herein, we will delve into the aforementioned challenges, unpack their implications, and foster a robust understanding of how innovative solutions can leverage synergistic ecosystems to empower stakeholders whilst navigating the complexities of modern discourse 🌟.

It is imperative that we approach this holistically, notwithstanding the pivotal role that bespoke, curated content plays in shaping the vibrant tapestry of human expression.`;
  run();
};
</script>
